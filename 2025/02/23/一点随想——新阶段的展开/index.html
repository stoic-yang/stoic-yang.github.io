    <h1>一点随想</h1>
  </header>

  <div class="post-content">
    <p>我之前实在是过于悲观了，没有一个宏大的规划，各种的换方向，导致自己一直在失败，摆烂带来的负面情绪很容易让人沉沦迷失自我。现在看来，我遇到的问题没有很复杂，只不过是相信自己可以达到自己的目标，一步一步去设计实现这个目标的步骤，坚定不移地贯彻自己的行动罢了，现在的我也已经基本确定了自己的目标。</p>
<p>不必感到自卑，不必感到伤感，只顾着往前走，脱去身上的冷气，实现你所宣称的未来</p>

  </div>
