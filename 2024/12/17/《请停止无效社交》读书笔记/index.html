    <h1>《请停止无效社交》读书笔记</h1>
  </header>

  <div class="post-content">
    <p>感觉挺商业化的一本书，不是很喜欢这种风格，不建议读，不过还是有几句话能让我学到东西。</p>
<blockquote>
<p>请记住：社交是因，关系是果，一定要学会主动为自己选择合适的圈层。</p>
</blockquote>
<blockquote>
<p>对不熟悉的人暴露自己的私密事，就会给对方带来不适感，这也是边界感不清晰的表现</p>
</blockquote>
<p>外圆内方</p>
<ul>
<li>外圆，与别人相处时要有很强的为他人考虑的能力</li>
<li>内方，你要知道自己要做一件什么事情</li>
</ul>

  </div>
