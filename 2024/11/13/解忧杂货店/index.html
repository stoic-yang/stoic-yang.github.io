    <h1>解忧杂货店</h1>
  </header>

  <div class="post-content">
    <blockquote>
<p>“这么多年咨询信看下来，逐渐明白，很多时候，咨询的人心里已经有了答案，来咨询只是想确认自己的决定是对的。”</p>
</blockquote>
<blockquote>
<p>如果自己不想积极认真地生活，不管得到什么样的回答都没用。</p>
</blockquote>
<blockquote>
<p>你的地图是一张白纸，所以即使想决定目的地，也不知道路在哪里……换个角度来看，正因为是一张白纸，才可以随心所欲地描绘地图。一切全在你自己。我衷心祈祷你可以相信自己，无悔地燃烧自己的人生。</p>
</blockquote>
<p>好温情的一本书，虽然有几个情节有点刀，但是确实也很治愈</p>

  </div>
